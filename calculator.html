<!DOCTYPE html>
<html>
<body>

<script>
function calculate(){
    let num1 = document.getElementById("number1").value;
    let num2 = document.getElementById("number2").value;
    let operation = document.getElementById("operation").value;

    // validation
    if(num1 === "" || isNaN(num1)){
        document.getElementById("num1_validation").innerHTML = "Please enter a valid number!";
        return;
    } else {
        document.getElementById("num1_validation").innerHTML = "";
    }

    if(num2 === "" || isNaN(num2)){
        document.getElementById("num2_validation").innerHTML = "Please enter a valid number!";
        return;
    } else {
        document.getElementById("num2_validation").innerHTML = "";
    }

    num1 = Number(num1);
    num2 = Number(num2);

    let result;

    if(operation === "+"){
        result = num1 + num2;
        document.getElementById("result_id").innerHTML = "The sum of two numbers is: " + result;
    }
    else if(operation === "-"){
        result = num1 - num2;
        document.getElementById("result_id").innerHTML = "The difference of two numbers is: " + result;
    }
    else if(operation === "*"){
        result = num1 * num2;
        document.getElementById("result_id").innerHTML = "The product of two numbers is: " + result;
    }
    else if(operation === "/"){
        result = num1 / num2;
        document.getElementById("result_id").innerHTML = "The division of two numbers is: " + result;
    }
}
</script>

<div style="text-align:center;">
<form>
<h2 style="color:coral;">Simple Calculator</h2>

<div>
<label>Enter number1</label>
<input type="text" id="number1"/>
<label id="num1_validation" style="color:red;"></label>
</div>

<br>

<div>
<label>Enter number2</label>
<input type="text" id="number2"/>
<label id="num2_validation" style="color:red;"></label>
</div>

<br>

<div>
<label>Select Operation</label>
<select id="operation">
<option value="+">+</option>
<option value="-">-</option>
<option value="*">*</option>
<option value="/">/</option>
</select>
</div>

<br>

<div>
<input type="button" value="Calculate" onclick="calculate()"/>
<h4 id="result_id">Result will be displayed:</h4>
</div>

</form>
</div>

</body>
</html>
